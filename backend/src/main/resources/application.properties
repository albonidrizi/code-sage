# Application
spring.application.name=codesage-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/codesage
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ Configuration - disabled for development
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_LISTENER_ENABLED:true}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1s
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# AI Provider Configuration
openai.api.key=${OPENAI_API_KEY:}
ai.model.openai=${OPENAI_MODEL:gpt-4}
claude.api.key=${CLAUDE_API_KEY:}
ai.model.claude=${CLAUDE_MODEL:claude-3-sonnet-20240229}

# GitHub App Configuration
github.app.id=${GITHUB_APP_ID:}
github.app.private-key-path=${GITHUB_APP_PRIVATE_KEY_PATH:}
github.installation.id=${GITHUB_INSTALLATION_ID:}
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:}
github.webhook.signature-required=${GITHUB_WEBHOOK_SIGNATURE_REQUIRED:true}

# Demo and HTTP policy
codesage.demo.enabled=${CODESAGE_DEMO_ENABLED:true}
codesage.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Logging
logging.level.root=INFO
logging.level.com.codesage=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-system}] %-5level %logger{36} - %msg%n

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
