name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Backend tests and coverage gates
        working-directory: backend
        run: mvn --batch-mode clean verify
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run test:coverage
      - working-directory: frontend
        run: npm run build

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --audit-level=high
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trivy filesystem gate
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3

  docker-demo-smoke:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build demo stack
        run: docker compose -f docker-compose.demo.yml build
      - name: Start demo stack
        run: docker compose -f docker-compose.demo.yml up -d --wait
      - name: Verify demo workflow
        run: |
          curl --fail http://localhost:8080/actuator/health
          curl --fail -X POST http://localhost:8080/api/demo/reviews
          curl --fail http://localhost:8080/api/reviews/recent
          curl --fail http://localhost:8088
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yml logs
      - if: always()
        run: docker compose -f docker-compose.demo.yml down -v
