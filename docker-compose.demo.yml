services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: codesage
      POSTGRES_PASSWORD: codesage-demo-db
      POSTGRES_DB: codesage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesage"]
      interval: 5s
      timeout: 3s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: codesage
      RABBITMQ_DEFAULT_PASS: codesage-demo-queue
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codesage
      SPRING_DATASOURCE_USERNAME: codesage
      SPRING_DATASOURCE_PASSWORD: codesage-demo-db
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: codesage
      SPRING_RABBITMQ_PASSWORD: codesage-demo-queue
      GITHUB_WEBHOOK_SIGNATURE_REQUIRED: "false"
      CODESAGE_DEMO_ENABLED: "true"
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  frontend:
    build: ./frontend
    ports: ["8088:80"]
    depends_on:
      backend: { condition: service_healthy }
